<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Reality Archive architecture</title>
  <desc id="desc">Local-first Next.js application with optional protected Foundry IQ knowledge-base retrieval and Microsoft Foundry story generation.</desc>
  <defs>
    <style>
      .bg { fill: #15130f; }
      .panel { fill: #ead9b8; stroke: #9d7440; stroke-width: 3; rx: 18; }
      .cloud { fill: #d7e6e1; stroke: #397060; stroke-width: 3; rx: 18; }
      .tool { fill: #d9c3e6; stroke: #704c86; stroke-width: 3; rx: 18; }
      .title { fill: #f0c27b; font: 700 40px Georgia, serif; }
      .label { fill: #2a1e10; font: 700 22px Arial, sans-serif; text-anchor: middle; }
      .small { fill: #4c3b27; font: 17px Arial, sans-serif; text-anchor: middle; }
      .arrow { stroke: #d9ad70; stroke-width: 4; fill: none; marker-end: url(#head); }
      .dash { stroke: #ad8ac1; stroke-width: 3; stroke-dasharray: 10 8; fill: none; marker-end: url(#toolHead); }
    </style>
    <marker id="head" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#d9ad70"/>
    </marker>
    <marker id="toolHead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ad8ac1"/>
    </marker>
  </defs>
  <rect class="bg" width="1400" height="900"/>
  <text class="title" x="70" y="70">Reality Archive: Local-First and Consent-Gated</text>

  <rect class="panel" x="70" y="130" width="250" height="120"/>
  <text class="label" x="195" y="178">Visitor</text>
  <text class="small" x="195" y="212">Explore, remember, preserve</text>

  <rect class="panel" x="390" y="130" width="300" height="120"/>
  <text class="label" x="540" y="174">Next.js + React UI</text>
  <text class="small" x="540" y="208">Local story shown first</text>

  <rect class="panel" x="390" y="330" width="300" height="120"/>
  <text class="label" x="540" y="374">Browser Storage</text>
  <text class="small" x="540" y="407">localStorage + IndexedDB</text>

  <rect class="panel" x="70" y="330" width="250" height="120"/>
  <text class="label" x="195" y="374">Maps and Places</text>
  <text class="small" x="195" y="407">Geoapify + OpenStreetMap</text>

  <rect class="cloud" x="760" y="130" width="270" height="120"/>
  <text class="label" x="895" y="174">Protected API</text>
  <text class="small" x="895" y="204">Origin, session, consent,</text>
  <text class="small" x="895" y="227">limits, rate control</text>

  <rect class="cloud" x="1090" y="130" width="250" height="120"/>
  <text class="label" x="1215" y="174">Azure AI Search</text>
  <text class="small" x="1215" y="208">Archive index</text>

  <rect class="cloud" x="1090" y="330" width="250" height="120"/>
  <text class="label" x="1215" y="374">Foundry IQ</text>
  <text class="small" x="1215" y="404">Managed knowledge base</text>
  <text class="small" x="1215" y="427">Grounded references</text>

  <rect class="cloud" x="760" y="530" width="270" height="120"/>
  <text class="label" x="895" y="574">Microsoft Foundry</text>
  <text class="small" x="895" y="607">Agent or model writes story</text>

  <rect class="tool" x="390" y="690" width="300" height="110"/>
  <text class="label" x="540" y="733">GitHub Copilot</text>
  <text class="small" x="540" y="765">Development assistance</text>

  <path class="arrow" d="M320 190 H390"/>
  <path class="arrow" d="M540 250 V330"/>
  <path class="arrow" d="M390 390 H320"/>
  <path class="arrow" d="M690 190 H760"/>
  <text class="small" x="725" y="174">Explicit consent</text>
  <path class="arrow" d="M1030 190 H1090"/>
  <path class="arrow" d="M1215 250 V330"/>
  <path class="arrow" d="M1090 390 H1030 C940 390 895 440 895 530"/>
  <path class="arrow" d="M760 590 H700 C620 590 600 510 600 450"/>
  <path class="dash" d="M540 690 V450"/>
  <path class="dash" d="M690 745 H895 V650"/>
</svg>

